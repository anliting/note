services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    volumes:
      - ./app/app:/app/app
  gateway:
    depends_on:
      - app
    image: nginx:1.25.5
    volumes:
      - ./dev/gatewayCnf:/etc/nginx/conf.d/default.conf
      - ./__1.pem:/app/crt
      - ./__1-key.pem:/app/key
